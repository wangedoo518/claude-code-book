site_name: Claude Code 源码解析红宝书
site_description: 基于 v2.1.88 双生逆向源码的设计思想深度解析
site_author: Warwolf Team
site_url: https://warwolf.github.io/warwolf.book/

repo_name: warwolf/warwolf.book
repo_url: https://github.com/warwolf/warwolf.book

copyright: Copyright &copy; 2026 Warwolf Team — 仅用于技术研究与教育目的

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    admonition:
      tip: material/lightbulb-outline
      question: material/help-circle-outline
      abstract: material/telescope
      warning: material/alert-outline
      info: material/information-outline
      success: material/check-circle-outline

plugins:
  - search:
      separator: '[\s\-\.]+'
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - assets/css/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/warwolf/warwolf.book

